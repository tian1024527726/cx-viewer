# OpenTelemetry Collector 配置示例
# 用于接收 CX Viewer 的网络报文追踪数据

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]
          allowed_headers: ["*"]

processors:
  # 批处理优化性能
  batch:
    timeout: 1s
    send_batch_size: 1024

  # 资源属性处理
  resource:
    attributes:
      - key: environment
        value: development
        action: upsert

  # 敏感信息过滤（可选）
  attributes:
    actions:
      - key: http.request.headers.authorization
        action: delete
      - key: http.request.headers.x-api-key
        action: delete

exporters:
  # 控制台输出（调试用）
  logging:
    loglevel: info

  # Jaeger 导出
  jaeger:
    endpoint: localhost:14250
    tls:
      insecure: true

  # OTLP HTTP 转发
  otlphttp:
    endpoint: http://localhost:4318

  # Prometheus（可选，用于指标）
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource, attributes]
      exporters: [logging, jaeger]

  telemetry:
    logs:
      level: info
